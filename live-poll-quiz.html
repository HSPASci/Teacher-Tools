<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Poll & Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --s-bg:#f0ede8;--s-card:#fff;--s-border:#e0d8d0;--s-text:#1a1410;--s-muted:#7a6e64;
  --p-bg:#0f1923;--p-text:#fff;--p-muted:rgba(255,255,255,.5);--p-surface:rgba(255,255,255,.06);
  --oc0:#e74c3c;--oc1:#2980b9;--oc2:#27ae60;--oc3:#e67e22;--oc4:#8e44ad;--oc5:#16a085;
  --correct:#2ecc71;
}

body{font-family:'DM Sans',sans-serif;background:var(--s-bg);color:var(--s-text);min-height:100vh}

.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* ─── SETUP HEADER ─── */
.setup-header{background:#1a1410;color:#fff;padding:0 1.25rem;height:56px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
.setup-title{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:#fff;font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;padding:2px 6px;outline:none;transition:border-color .15s}
.setup-title:focus{border-bottom-color:rgba(255,255,255,.35)}
.tbtn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
.tbtn:hover{background:rgba(255,255,255,.2)}
.tbtn.go{background:#e74c3c;border-color:transparent;color:#fff}
.tbtn.go:hover{background:#c0392b}
.tbtn.go:disabled{background:#555;cursor:not-allowed}

/* ─── SETUP BODY ─── */
.setup-body{max-width:760px;margin:0 auto;padding:1.5rem;width:100%;flex:1}
.setup-hint{font-size:13px;color:var(--s-muted);margin-bottom:1rem}
.tpl-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.tpl-lbl{font-size:12px;color:#aaa}
.tpl-btn{background:#fff;border:1.5px solid var(--s-border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--s-muted);cursor:pointer;transition:all .15s}
.tpl-btn:hover{border-color:#888;color:#444;background:#f5f2ee}

/* ─── QUESTION CARD ─── */
.q-card{background:var(--s-card);border:1.5px solid var(--s-border);border-radius:14px;padding:1.25rem;margin-bottom:12px}
.q-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.q-num{width:28px;height:28px;border-radius:50%;background:#1a1410;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Outfit',sans-serif;margin-top:6px}
.q-textarea{flex:1;border:1.5px solid var(--s-border);border-radius:9px;padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--s-text);outline:none;resize:none;line-height:1.4;transition:border-color .15s}
.q-textarea:focus{border-color:#1a1410}
.q-remove{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:4px 5px;border-radius:4px;transition:color .15s;flex-shrink:0;margin-top:2px}
.q-remove:hover{color:#e74c3c}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-row{display:flex;align-items:center;gap:7px}
.opt-dot{width:26px;height:26px;border-radius:6px;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-family:'Outfit',sans-serif}
.opt-inp{flex:1;border:1.5px solid var(--s-border);border-radius:7px;padding:6px 9px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--s-text);outline:none;transition:border-color .15s}
.opt-inp:focus{border-color:#888}
.opt-tick{background:none;border:1.5px solid var(--s-border);border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--s-muted);transition:all .15s;flex-shrink:0}
.opt-tick:hover{border-color:var(--correct);color:var(--correct)}
.opt-tick.on{background:var(--correct);border-color:var(--correct);color:#fff}
.q-footer{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--s-muted);flex-wrap:wrap}
.q-footer-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.small-btn{background:none;border:1px dashed var(--s-border);border-radius:7px;padding:4px 10px;font-size:12px;color:var(--s-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.small-btn:hover{border-color:#888;color:#444}
.timer-inp{width:54px;border:1.5px solid var(--s-border);border-radius:6px;padding:4px 7px;font-size:13px;font-family:'DM Sans',sans-serif;text-align:center;outline:none;color:var(--s-text)}
.add-q-btn{width:100%;background:var(--s-card);border:2px dashed var(--s-border);border-radius:14px;padding:14px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--s-muted);cursor:pointer;transition:all .15s;margin-top:4px}
.add-q-btn:hover{background:#ece8e2;border-color:#bbb;color:#444}
.empty-q{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px}

/* ─── PRESENT SCREEN ─── */
#presentScreen{background:var(--p-bg);color:var(--p-text)}

.p-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 1.25rem;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.p-quiz-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--p-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.p-center{display:flex;align-items:center;gap:12px}
.q-prog{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:rgba(255,255,255,.6)}
.p-edit-btn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s;flex-shrink:0}
.p-edit-btn:hover{background:rgba(255,255,255,.16)}

/* Timer ring */
.t-ring{width:50px;height:50px;position:relative;flex-shrink:0}
.t-ring circle{fill:none;stroke-width:4}
.t-track{stroke:rgba(255,255,255,.1)}
.t-fill{stroke:#f39c12;stroke-linecap:round;transform-origin:25px 25px;transform:rotate(-90deg);transition:stroke-dashoffset 1s linear,stroke .3s}
.t-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff}

.p-body{flex:1;display:flex;flex-direction:column;padding:1.25rem 1.5rem;max-width:920px;margin:0 auto;width:100%}

/* Status pill */
.status{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;align-self:center;margin-bottom:.75rem}
.status .dot{width:7px;height:7px;border-radius:50%}
.s-wait{background:rgba(255,255,255,.07);color:rgba(255,255,255,.45)}
.s-wait .dot{background:rgba(255,255,255,.3)}
.s-open{background:rgba(46,204,113,.14);color:#2ecc71}
.s-open .dot{background:#2ecc71;animation:blink 1s infinite}
.s-done{background:rgba(231,76,60,.14);color:#e74c3c}
.s-done .dot{background:#e74c3c}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.q-text{font-family:'Outfit',sans-serif;font-size:clamp(20px,2.8vw,32px);font-weight:700;line-height:1.3;color:#fff;text-align:center;margin:.5rem 0 1.25rem;min-height:48px}

/* Voting grid */
.vote-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:1.25rem}
.vote-btn{border:none;border-radius:13px;padding:17px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;text-align:left;transition:transform .1s,filter .15s;position:relative}
.vote-btn:not(:disabled):hover{transform:scale(1.03);filter:brightness(1.1)}
.vote-btn:not(:disabled):active{transform:scale(.97)}
.vote-btn:disabled{cursor:default;opacity:.85}
.v-lbl{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;flex-shrink:0}
.v-txt{flex:1;line-height:1.3}
.v-badge{background:rgba(0,0,0,.25);border-radius:12px;padding:2px 10px;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;flex-shrink:0}

/* Results */
.results{display:flex;flex-direction:column;gap:9px;margin-bottom:1.25rem}
.r-row{display:flex;align-items:center;gap:9px}
.r-dot{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.r-label{width:130px;font-size:13px;color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.r-track{flex:1;height:40px;background:rgba(255,255,255,.07);border-radius:8px;overflow:hidden}
.r-bar{height:100%;border-radius:8px;width:0%;transition:width .75s cubic-bezier(.34,1.4,.64,1)}
.r-bar.winner{box-shadow:0 0 14px rgba(46,204,113,.45)}
.r-pct{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;min-width:44px;text-align:right;color:#fff;flex-shrink:0}
.r-tick{font-size:16px;opacity:0;transition:opacity .3s .5s;flex-shrink:0;width:22px}
.r-tick.show{opacity:1}

.votes-total{text-align:center;font-size:12px;color:rgba(255,255,255,.35);font-family:'Outfit',sans-serif;margin-bottom:.5rem}

/* Controls */
.p-ctrl{display:flex;gap:9px;align-items:center;justify-content:center;padding:.75rem 0 1.25rem;flex-wrap:wrap;flex-shrink:0}
.cb{border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.cb:disabled{opacity:.3;cursor:not-allowed}
.cb-open{background:#2ecc71;color:#0c1f14}
.cb-open:hover:not(:disabled){background:#27ae60}
.cb-close{background:#e74c3c;color:#fff}
.cb-close:hover:not(:disabled){background:#c0392b}
.cb-ghost{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.18)}
.cb-ghost:hover:not(:disabled){background:rgba(255,255,255,.18)}
.cb-reveal{background:#f39c12;color:#2d1a00}
.cb-reveal:hover:not(:disabled){background:#e67e22}
.cb-next{background:#fff;color:#1a1410}
.cb-next:hover:not(:disabled){background:#f0ede8}
.cb-summary{background:#8e44ad;color:#fff}
.cb-summary:hover:not(:disabled){background:#7d3c98}

/* ─── SUMMARY SCREEN ─── */
#summaryScreen{background:var(--p-bg);color:var(--p-text)}
.sum-head{text-align:center;padding:2rem 1.5rem 1rem}
.sum-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px}
.sum-sub{color:rgba(255,255,255,.4);font-size:13px}
.sum-body{max-width:740px;margin:0 auto;padding:.75rem 1.5rem 2rem;width:100%;flex:1}
.sum-q{background:rgba(255,255,255,.05);border-radius:12px;padding:1rem 1.25rem;margin-bottom:11px}
.sum-qt{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:9px;color:#fff}
.sum-opts{display:flex;flex-direction:column;gap:5px}
.sum-row{display:flex;align-items:center;gap:8px;font-size:12px}
.sum-track{flex:1;height:20px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.sum-bar{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.4,.64,1)}
.sum-foot{display:flex;gap:9px;justify-content:center;padding:1rem 1.5rem 1.5rem;flex-shrink:0;flex-wrap:wrap}
</style>
</head>
<body>

<!-- ═══════════ SETUP SCREEN ═══════════ -->
<section id="setupScreen" class="screen active">
  <div class="setup-header">
    <span style="font-size:19px;flex-shrink:0">📊</span>
    <input class="setup-title" id="quizTitle" value="Class Quiz" maxlength="60" placeholder="Quiz / Poll title" />
    <button class="tbtn" onclick="window.open('','_blank') && false" style="display:none"></button>
    <button class="tbtn go" id="btnPresent" onclick="startPresenting()">▶ Present</button>
  </div>
  <div class="setup-body">
    <p class="setup-hint">Add questions below. Mark the correct answer with ✓ (optional — leave blank for polls). Click ▶ Present when ready to project.</p>
    <div class="tpl-bar">
      <span class="tpl-lbl">Quick add:</span>
      <button class="tpl-btn" onclick="addTpl('tf')">True / False</button>
      <button class="tpl-btn" onclick="addTpl('yn')">Yes / No</button>
      <button class="tpl-btn" onclick="addTpl('mc4')">4-option MC</button>
      <button class="tpl-btn" onclick="addTpl('agree')">Agreement scale</button>
      <button class="tpl-btn" onclick="addTpl('rate')">1–5 Rating</button>
    </div>
    <div id="qList"></div>
    <button class="add-q-btn" onclick="addQ()">＋ Add blank question</button>
  </div>
</section>

<!-- ═══════════ PRESENT SCREEN ═══════════ -->
<section id="presentScreen" class="screen">
  <div class="p-topbar">
    <div class="p-quiz-name" id="pTitle">Class Quiz</div>
    <div class="p-center">
      <div class="t-ring" id="tRing" style="display:none">
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle class="t-track" cx="25" cy="25" r="21"/>
          <circle class="t-fill" id="tCircle" cx="25" cy="25" r="21" stroke-dasharray="131.9" stroke-dashoffset="0"/>
        </svg>
        <div class="t-label" id="tLabel">30</div>
      </div>
      <div class="q-prog" id="qProg">Q 1 / 1</div>
    </div>
    <button class="p-edit-btn" onclick="goSetup()">← Edit</button>
  </div>

  <div class="p-body">
    <div class="status s-wait" id="statusPill">
      <span class="dot"></span><span id="statusTxt">Waiting to start</span>
    </div>
    <p class="q-text" id="qTxt"></p>
    <div class="vote-grid" id="voteGrid"></div>
    <div class="results" id="resultsArea" style="display:none"></div>
    <div class="votes-total" id="vtotal"></div>
  </div>

  <div class="p-ctrl" id="pCtrl"></div>
</section>

<!-- ═══════════ SUMMARY SCREEN ═══════════ -->
<section id="summaryScreen" class="screen">
  <div class="sum-head">
    <div class="sum-title">📊 Results summary</div>
    <div class="sum-sub" id="sumSub"></div>
  </div>
  <div class="sum-body" id="sumBody"></div>
  <div class="sum-foot">
    <button class="cb cb-ghost" onclick="goSetup()">← Edit quiz</button>
    <button class="cb cb-next" onclick="startPresenting()">▶ Present again</button>
  </div>
</section>

<script>
const OC=['#e74c3c','#2980b9','#27ae60','#e67e22','#8e44ad','#16a085'];
const OL=['A','B','C','D','E','F'];

let qs=[];
let cur=0;
let vState='wait'; // wait | open | closed
let tInt=null;
let tLeft=0;
let revealed=false;

/* ── SETUP ── */
function addQ(data){
  qs.push(data||{id:'q'+Date.now()+Math.random().toString(36).slice(2),text:'',opts:['','','',''],correct:-1,timer:30,votes:[]});
  renderQList();
}

function addTpl(t){
  const T={
    tf:  {text:'',opts:['True','False'],correct:-1,timer:20},
    yn:  {text:'',opts:['Yes','No','Maybe'],correct:-1,timer:20},
    mc4: {text:'',opts:['','','',''],correct:-1,timer:30},
    agree:{text:'',opts:['Strongly agree','Agree','Neutral','Disagree','Strongly disagree'],correct:-1,timer:30},
    rate:{text:'',opts:['⭐ 1','⭐⭐ 2','⭐⭐⭐ 3','⭐⭐⭐⭐ 4','⭐⭐⭐⭐⭐ 5'],correct:-1,timer:20},
  };
  addQ({id:'q'+Date.now()+Math.random().toString(36).slice(2),votes:[],...T[t]});
}

function removeQ(id){ qs=qs.filter(q=>q.id!==id); renderQList(); }

function toggleCorrect(id,oi){
  const q=qs.find(q=>q.id===id);
  if(q){q.correct=q.correct===oi?-1:oi; renderQList();}
}

function addOpt(id){
  const q=qs.find(q=>q.id===id);
  if(q&&q.opts.length<6){q.opts.push('');renderQList();}
}
function rmOpt(id){
  const q=qs.find(q=>q.id===id);
  if(q&&q.opts.length>2){
    q.opts.pop();
    if(q.correct>=q.opts.length)q.correct=-1;
    renderQList();
  }
}

function renderQList(){
  const el=document.getElementById('qList');
  document.getElementById('btnPresent').disabled=qs.length===0;
  if(qs.length===0){el.innerHTML='<div class="empty-q">No questions yet — use the quick-add templates above or click ＋ Add below.</div>';return;}
  el.innerHTML=qs.map((q,qi)=>`
    <div class="q-card" id="card${q.id}">
      <div class="q-card-top">
        <div class="q-num">${qi+1}</div>
        <textarea class="q-textarea" rows="2" placeholder="Question ${qi+1}…" data-id="${q.id}" data-f="text">${x(q.text)}</textarea>
        <button class="q-remove" onclick="removeQ('${q.id}')" title="Remove">✕</button>
      </div>
      <div class="opts-grid">
        ${q.opts.map((o,oi)=>`
          <div class="opt-row">
            <div class="opt-dot" style="background:${OC[oi%6]}">${OL[oi]}</div>
            <input class="opt-inp" value="${x(o)}" placeholder="Option ${OL[oi]}" data-id="${q.id}" data-oi="${oi}" />
            <button class="opt-tick${q.correct===oi?' on':''}" onclick="toggleCorrect('${q.id}',${oi})" title="Mark correct">✓</button>
          </div>
        `).join('')}
      </div>
      <div class="q-footer">
        ${q.opts.length<6?`<button class="small-btn" onclick="addOpt('${q.id}')">＋ option</button>`:''}
        ${q.opts.length>2?`<button class="small-btn" onclick="rmOpt('${q.id}')">− option</button>`:''}
        <div class="q-footer-right">
          <span>Timer:</span>
          <input class="timer-inp" type="number" min="0" max="300" value="${q.timer}" data-id="${q.id}" data-f="timer" />
          <span>sec (0 = off)</span>
        </div>
      </div>
    </div>
  `).join('');

  el.querySelectorAll('[data-f="text"]').forEach(e=>e.addEventListener('input',ev=>{
    const q=qs.find(q=>q.id===ev.target.dataset.id);if(q)q.text=ev.target.value;
  }));
  el.querySelectorAll('[data-f="timer"]').forEach(e=>e.addEventListener('change',ev=>{
    const q=qs.find(q=>q.id===ev.target.dataset.id);if(q)q.timer=Math.max(0,parseInt(ev.target.value)||0);
  }));
  el.querySelectorAll('.opt-inp').forEach(e=>e.addEventListener('input',ev=>{
    const q=qs.find(q=>q.id===ev.target.dataset.id);if(q)q.opts[+ev.target.dataset.oi]=ev.target.value;
  }));
}

/* ── PRESENTING ── */
function startPresenting(){
  if(qs.length===0)return;
  qs.forEach(q=>{q.votes=q.opts.map(()=>0);});
  cur=0; revealed=false;
  showScreen('presentScreen');
  loadQ(cur);
}

function loadQ(i){
  clearTimer(); vState='wait'; revealed=false;
  const q=qs[i];
  document.getElementById('pTitle').textContent=document.getElementById('quizTitle').value||'Class Quiz';
  document.getElementById('qProg').textContent=`Q ${i+1} / ${qs.length}`;
  document.getElementById('qTxt').textContent=q.text||`Question ${i+1}`;
  document.getElementById('resultsArea').style.display='none';
  document.getElementById('vtotal').textContent='';
  setStatus('wait','Waiting to start');
  renderVoteGrid(q);
  renderCtrl();
}

function renderVoteGrid(q){
  const g=document.getElementById('voteGrid');
  g.style.display='';
  const isOpen=vState==='open';
  g.innerHTML=q.opts.map((o,oi)=>`
    <button class="vote-btn" style="background:${OC[oi%6]}"
            onclick="castVote(${oi})" ${!isOpen?'disabled':''} data-oi="${oi}">
      <span class="v-lbl">${OL[oi]}</span>
      <span class="v-txt">${x(o||'…')}</span>
      ${vState==='closed'?`<span class="v-badge">${q.votes[oi]}</span>`:''}
    </button>
  `).join('');
}

function castVote(oi){
  if(vState!=='open')return;
  const q=qs[cur];
  q.votes[oi]++;
  const total=q.votes.reduce((a,b)=>a+b,0);
  document.getElementById('vtotal').textContent=`${total} vote${total!==1?'s':''}`;
  renderVoteGrid(q);
}

function openVoting(){
  vState='open'; const q=qs[cur];
  q.votes=q.opts.map(()=>0);
  setStatus('open','Voting open');
  renderVoteGrid(q); renderCtrl();
  document.getElementById('vtotal').textContent='0 votes';
  if(q.timer>0)startTimer(q.timer);
}

function closeVoting(){
  vState='closed'; clearTimer();
  setStatus('done','Voting closed');
  renderVoteGrid(qs[cur]);
  showResults(false); renderCtrl();
}

function showResults(withCorrect){
  const q=qs[cur];
  const total=q.votes.reduce((a,b)=>a+b,0);
  document.getElementById('voteGrid').style.display='none';
  const area=document.getElementById('resultsArea');
  area.style.display='flex';
  const maxVotes=Math.max(...q.votes,1);
  area.innerHTML=q.opts.map((o,oi)=>{
    const pct=total>0?Math.round(q.votes[oi]/total*100):0;
    const isWin=q.votes[oi]===maxVotes&&total>0;
    const isCorr=withCorrect&&q.correct===oi;
    const barCol=isCorr?'#2ecc71':OC[oi%6];
    return `
      <div class="r-row">
        <div class="r-dot" style="background:${OC[oi%6]}">${OL[oi]}</div>
        <div class="r-label" title="${x(o||'…')}">${x(o||'…')}</div>
        <div class="r-track">
          <div class="r-bar${isCorr?' winner':''}" id="rb${oi}" style="background:${barCol};width:0%"></div>
        </div>
        <div class="r-pct">${pct}%</div>
        ${q.correct===oi?`<span class="r-tick${withCorrect?' show':''}" id="rt${oi}">✅</span>`:'<span class="r-tick"></span>'}
      </div>`;
  }).join('');
  document.getElementById('vtotal').textContent=`${total} vote${total!==1?'s':''} total`;
  setTimeout(()=>{
    q.opts.forEach((_,oi)=>{
      const total2=q.votes.reduce((a,b)=>a+b,0);
      const pct=total2>0?Math.round(q.votes[oi]/total2*100):0;
      const b=document.getElementById('rb'+oi);
      if(b)b.style.width=(pct>0?Math.max(pct,2):0)+'%';
    });
  },60);
}

function revealAnswer(){
  revealed=true;
  showResults(true);
  renderCtrl();
}

function renderCtrl(){
  const isLast=cur>=qs.length-1;
  const q=qs[cur];
  let h='';
  if(vState==='wait'){
    h+=`<button class="cb cb-open" onclick="openVoting()">▶ Open voting</button>`;
    if(cur>0)h+=`<button class="cb cb-ghost" onclick="prevQ()">← Prev</button>`;
  } else if(vState==='open'){
    h+=`<button class="cb cb-close" onclick="closeVoting()">⏹ Close & show results</button>`;
  } else {
    if(q.correct>=0&&!revealed)h+=`<button class="cb cb-reveal" onclick="revealAnswer()">🔑 Reveal answer</button>`;
    if(isLast)h+=`<button class="cb cb-summary" onclick="showSummary()">📊 View summary</button>`;
    else h+=`<button class="cb cb-next" onclick="nextQ()">Next question →</button>`;
  }
  document.getElementById('pCtrl').innerHTML=h;
}

function nextQ(){if(cur<qs.length-1){cur++;loadQ(cur);}}
function prevQ(){if(cur>0){cur--;loadQ(cur);}}

/* ── TIMER ── */
function startTimer(secs){
  tLeft=secs;
  const ring=document.getElementById('tRing');
  const circ=document.getElementById('tCircle');
  const lbl=document.getElementById('tLabel');
  const C=131.9;
  ring.style.display='block';
  lbl.textContent=secs;
  circ.style.strokeDashoffset='0';
  circ.style.stroke='#f39c12';
  tInt=setInterval(()=>{
    tLeft--;
    lbl.textContent=Math.max(0,tLeft);
    circ.style.strokeDashoffset=C*(1-(tLeft/secs));
    if(tLeft<=5)circ.style.stroke='#e74c3c';
    if(tLeft<=0){clearTimer();closeVoting();}
  },1000);
}

function clearTimer(){
  clearInterval(tInt);
  document.getElementById('tRing').style.display='none';
}

/* ── SUMMARY ── */
function showSummary(){
  showScreen('summaryScreen');
  const withAnswers=qs.filter(q=>q.correct>=0).length;
  document.getElementById('sumSub').textContent=
    `${qs.length} question${qs.length!==1?'s':''} · ${withAnswers} with correct answer${withAnswers!==1?'s':''}`;
  const body=document.getElementById('sumBody');
  body.innerHTML=qs.map((q,qi)=>{
    const total=(q.votes||[]).reduce((a,b)=>a+b,0);
    return `
      <div class="sum-q">
        <div class="sum-qt">${qi+1}. ${x(q.text||'(no question text)')}</div>
        <div class="sum-opts">
          ${q.opts.map((o,oi)=>{
            const v=(q.votes&&q.votes[oi])||0;
            const pct=total>0?Math.round(v/total*100):0;
            const isC=q.correct===oi;
            return `
              <div class="sum-row">
                <div style="width:22px;height:22px;border-radius:5px;background:${OC[oi%6]};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Outfit',sans-serif">${OL[oi]}</div>
                <div style="width:115px;font-size:12px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${x(o||'…')}</div>
                <div class="sum-track"><div class="sum-bar" style="width:${pct}%;background:${isC?'#2ecc71':OC[oi%6]}"></div></div>
                <div style="font-size:12px;font-weight:600;min-width:36px;text-align:right;color:rgba(255,255,255,.65);flex-shrink:0">${pct}%</div>
                ${isC?'<span style="margin-left:5px;font-size:13px">✅</span>':''}
              </div>`;
          }).join('')}
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:8px">${total} vote${total!==1?'s':''}</div>
      </div>`;
  }).join('');
}

/* ── UTILS ── */
function setStatus(type,txt){
  const p=document.getElementById('statusPill');
  p.className=`status s-${type}`;
  document.getElementById('statusTxt').textContent=txt;
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goSetup(){
  clearTimer();
  showScreen('setupScreen');
  renderQList();
}
function x(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── INIT ── */
addTpl('mc4');
qs[0].text='';
renderQList();
</script>
</body>
</html>
